<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Graph Viewer</title>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: '#1a1a2e',
            darkpanel: 'rgba(0,0,0,0.85)',
          }
        }
      }
    }
  </script>
  <style>
    [x-cloak] { display: none !important; }
    .node { stroke: #9ca3af; stroke-width: 1.7px; cursor: pointer; fill: #f8fafc; transition: all 0.15s ease; }
    .node:hover { stroke-width: 3px; filter: drop-shadow(0 0 6px currentColor); }
    .link { stroke: #4a4a6a; stroke-opacity: 0.4; transition: stroke-opacity 0.2s; }
    .link:hover { stroke-opacity: 0.9; }
    .label { fill: #e2e8f0; font-size: 9px; pointer-events: none; font-weight: 400; text-shadow: 0 1px 3px rgba(0,0,0,0.9); }
    .node-new circle {
      animation: newNodePulse 1.5s ease-out forwards;
    }
    @keyframes newNodePulse {
      0% {
        stroke-width: 5px;
        filter: drop-shadow(0 0 3px #22c55e);
      }
      70% {
        stroke-width: 3px;
        filter: drop-shadow(0 0 2px #22c55e);
      }
      100% {
        stroke-width: 1.5px;
        filter: drop-shadow(0 0 0 transparent);
      }
    }
    .node-removing circle {
      stroke: #ef4444 !important;
      stroke-width: 3px !important;
      opacity: 1;
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #4a5568;
      border-radius: 2px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #718096;
    }
  </style>
</head>
<body class="bg-dark text-gray-200 overflow-hidden" x-data="graphApp()">

  <div class="fixed top-4 left-4 bg-darkpanel/90 backdrop-blur rounded-xl p-3 text-xs border border-gray-700/50 flex items-center gap-4 z-50 shadow-lg shadow-black/20">
    <div class="flex items-center gap-1.5">
      <svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><circle cx="5" cy="6" r="2"/><circle cx="19" cy="6" r="2"/><circle cx="5" cy="18" r="2"/><circle cx="19" cy="18" r="2"/><path d="M12 9V6M12 15v3M9 12H6M15 12h3" stroke-linecap="round"/></svg>
      <span class="text-gray-400">N:</span>
      <span class="text-blue-400 font-bold tabular-nums" x-text="$store.graphStore.nodeCount">0</span>
    </div>
    <div class="w-px h-4 bg-gray-700"></div>
    <div class="flex items-center gap-1.5">
      <svg class="w-4 h-4 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 12h16M4 12l4-4M4 12l4 4M20 12l-4-4M20 12l-4 4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="text-gray-400">E:</span>
      <span class="text-purple-400 font-bold tabular-nums" x-text="$store.graphStore.linkCount">0</span>
    </div>
    <div class="w-px h-4 bg-gray-700"></div>
    <div class="flex items-center gap-1.5">
      <svg class="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" stroke-linecap="round"/></svg>
      <span class="text-green-400 font-bold tabular-nums" x-text="$store.graphStore.updateCount">0</span>
    </div>
    <div class="w-px h-4 bg-gray-700"></div>
    <span class="text-gray-500 text-[10px] max-w-[120px] truncate" x-text="$store.graphStore.lastUpdateText">Sin cambios detectados</span>
    <button @click="forceRefresh()" class="ml-auto bg-gray-700/50 hover:bg-gray-600/70 px-2.5 py-1 rounded-lg text-[10px] text-gray-400 hover:text-white transition-colors flex items-center gap-1">
      <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m0 0a8.001 8.001 0 0115.356 2M44v5h.582m0 0a8.001 8.001 0 0115.356 2M20 20v-5h-.582m0 0a8.001 8.001 0 01-15.356-2M20 20v-5h-.582m0 0a8.001 8.001 0 01-15.356-2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Refresh
    </button>
  </div>

  <div x-show="$store.graphStore.focusedNodeId" x-cloak
    class="fixed top-4 left-1/2 transform -translate-x-1/2 bg-blue-600/90 hover:bg-blue-500 backdrop-blur rounded-xl px-4 py-2 text-sm font-medium cursor-pointer z-50 shadow-lg shadow-blue-900/30 transition-all"
    @click="resetLayout()">
    <span class="flex items-center gap-2">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m0 0a8.001 8.001 0 0115.356 2M20 20v-5h-.581m0 0a8.001 8.001 0 01-15.356-2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Reacomodar
    </span>
  </div>

  <div x-show="$store.graphStore.selectedNode !== null" x-cloak
    class="fixed top-20 right-4 w-[420px] max-h-[calc(100vh-120px)] bg-darkpanel/95 backdrop-blur-sm rounded-2xl border border-gray-700/50 overflow-hidden flex flex-col z-50 shadow-2xl shadow-black/40">
    <!-- Header with gradient -->
    <div class="px-5 py-4 bg-gradient-to-r from-blue-900/40 to-purple-900/40 border-b border-gray-700/50">
      <div class="flex justify-between items-start">
        <div class="flex-1 min-w-0">
          <h3 class="text-base font-semibold text-blue-300 truncate" x-text="$store.graphStore.selectedNode?.name">-</h3>
          <div class="flex items-center gap-2 mt-1.5">
            <span class="text-[10px] px-1.5 py-0.5 rounded bg-gray-800/70 text-gray-400 font-mono" x-text="'#' + ($store.graphStore.entityDetail?.entity?.id || '-')"></span>
            <span class="text-[10px] px-1.5 py-0.5 rounded bg-gray-800/70 text-gray-300 capitalize" x-text="$store.graphStore.entityDetail?.entity?.entityType || '-'"></span>
            <span class="text-[10px] px-1.5 py-0.5 rounded capitalize" :class="getImportanceClass($store.graphStore.selectedNode?.group)" x-text="$store.graphStore.selectedNode?.group || 'unknown'"></span>
          </div>
        </div>
        <button @click="$store.graphStore.selectedNode = null" class="ml-3 text-gray-500 hover:text-white hover:bg-white/10 rounded-lg p-1.5 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>

    <template x-if="$store.graphStore.loadingDetail">
      <div class="p-8 text-center">
        <div class="inline-flex items-center gap-2 text-gray-400">
          <svg class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
          <span class="text-sm">Cargando...</span>
        </div>
      </div>
    </template>

    <template x-if="!$store.graphStore.loadingDetail && $store.graphStore.entityDetail">
      <div class="p-5 overflow-y-auto flex-1 space-y-5">

        <!-- observations -->
        <div>
          <div class="flex items-center justify-between mb-3">
            <h4 class="text-xs font-medium text-gray-400 uppercase tracking-wider">Observaciones</h4>
            <span class="text-[10px] px-2 py-0.5 rounded-full bg-blue-500/20 text-blue-400" x-text="$store.graphStore.entityDetail.observations.length + ' obs'"></span>
          </div>
          <template x-if="$store.graphStore.entityDetail.observations.length === 0">
            <p class="text-gray-600 text-xs italic py-2">Sin observaciones</p>
          </template>
          <div class="max-h-48 overflow-y-auto space-y-2 pr-1 custom-scrollbar">
            <template x-for="obs in $store.graphStore.entityDetail.observations" :key="obs.id">
              <div class="bg-white/[0.03] hover:bg-white/[0.06] rounded-lg p-3 text-xs transition-colors border border-white/[0.03]">
                <div class="flex items-center justify-between mb-2">
                  <span class="px-2 py-0.5 rounded text-[10px] uppercase font-medium" :class="getImportanceClass(obs.importance)" x-text="obs.importance"></span>
                  <span class="text-gray-600 text-[10px]" x-text="formatDate(obs.created_at)"></span>
                </div>
                <p class="text-gray-300 leading-relaxed text-[11px]" x-text="obs.content"></p>
              </div>
            </template>
          </div>
        </div>

        <!-- Outgoing Relations -->
        <div>
          <div class="flex items-center justify-between mb-3">
            <h4 class="text-xs font-medium text-gray-400 uppercase tracking-wider">Relaciones salientes</h4>
            <span class="text-[10px] px-2 py-0.5 rounded-full bg-purple-500/20 text-purple-400" x-text="$store.graphStore.entityDetail.outgoing.length + ' →'"></span>
          </div>
          <template x-if="$store.graphStore.entityDetail.outgoing.length === 0">
            <p class="text-gray-600 text-xs italic py-2">Sin relaciones</p>
          </template>
          <div class="max-h-36 overflow-y-auto space-y-1.5 pr-1 custom-scrollbar">
            <template x-for="rel in $store.graphStore.entityDetail.outgoing" :key="rel.id">
              <div class="bg-white/[0.03] hover:bg-white/[0.06] rounded-lg p-2.5 text-xs transition-colors flex items-center gap-2 border border-white/[0.03]">
                <span class="text-[9px] text-gray-600 font-mono" x-text="'#' + rel.id"></span>
                <span class="px-2 py-0.5 rounded-md bg-purple-500/20 text-purple-300 text-[10px] font-medium truncate" x-text="rel.relationType"></span>
                <span class="text-gray-300 truncate flex-1 text-[11px]" x-text="rel.to_name"></span>
                <svg class="w-3 h-3 text-gray-600 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </div>
            </template>
          </div>
        </div>

        <!-- Incoming Relations -->
        <div>
          <div class="flex items-center justify-between mb-3">
            <h4 class="text-xs font-medium text-gray-400 uppercase tracking-wider">Relaciones entrantes</h4>
            <span class="text-[10px] px-2 py-0.5 rounded-full bg-emerald-500/20 text-emerald-400" x-text="$store.graphStore.entityDetail.incoming.length + ' ←'"></span>
          </div>
          <template x-if="$store.graphStore.entityDetail.incoming.length === 0">
            <p class="text-gray-600 text-xs italic py-2">Sin relaciones</p>
          </template>
          <div class="max-h-36 overflow-y-auto space-y-1.5 pr-1 custom-scrollbar">
            <template x-for="rel in $store.graphStore.entityDetail.incoming" :key="rel.id">
              <div class="bg-white/[0.03] hover:bg-white/[0.06] rounded-lg p-2.5 text-xs transition-colors flex items-center gap-2 border border-white/[0.03]">
                <svg class="w-3 h-3 text-gray-600 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <span class="text-gray-300 truncate flex-1 text-[11px] text-right" x-text="rel.from_name"></span>
                <span class="px-2 py-0.5 rounded-md bg-emerald-500/20 text-emerald-300 text-[10px] font-medium truncate" x-text="rel.relationType"></span>
                <span class="text-[9px] text-gray-600 font-mono" x-text="'#' + rel.id"></span>
              </div>
            </template>
          </div>
        </div>
      </div>
    </template>
  </div>

  <svg id="graph" class="w-screen h-screen"></svg>

  <script>
    function getNodeColor(group) {
      if (!group || typeof group !== 'string') return '#9ca3af';
      if (colorMap[group]) return colorMap[group];
      var hash = 0;
      for (var i = 0; i < group.length; i++) {
        hash = group.charCodeAt(i) + ((hash << 5) - hash);
      }
      var hue = Math.abs(hash % 360);
      return 'hsl(' + hue + ', 70%, 50%)';
    }

    var colorMap = {
      critical: '#ff6b6b',
      important: '#ffd93d',
      normal: '#6bcb77',
      temporary: '#4d96ff',
      deprecated: '#9d4edd',
      unknown: '#9ca3af'
    };

    function getImportanceClass(level) {
      var map = {
        critical: 'bg-red-900/50 text-red-300 border border-red-700',
        important: 'bg-yellow-900/50 text-yellow-300 border border-yellow-700',
        normal: 'bg-green-900/50 text-green-300 border border-green-700',
        temporary: 'bg-blue-900/50 text-blue-300 border border-blue-700',
        deprecated: 'bg-purple-900/50 text-purple-300 border border-purple-700',
        unknown: 'bg-gray-700/50 text-gray-300 border border-gray-600'
      };
      return map[level] || map.unknown;
    }

    // Initialize Alpine store BEFORE graphApp
    document.addEventListener('alpine:init', function() {
      Alpine.store('graphStore', {
        nodeCount: 0,
        linkCount: 0,
        updateCount: 0,
        lastUpdateText: 'Sin cambios detectados',
        selectedNode: null,
        entityDetail: null,
        loadingDetail: false,
        activeFilters: ['critical', 'important', 'normal', 'temporary', 'deprecated', 'unknown'],
        _initialized: false,
        focusedNodeId: null
      });
    });

    function graphApp() {
      var app = {
        init: function() {
          if (Alpine.store('graphStore')._initialized) {
            console.warn('[INIT] Already initialized, skipping');
            return;
          }
          Alpine.store('graphStore')._initialized = true;

          var width = window.innerWidth;
          var height = window.innerHeight;
          var svg = d3.select('#graph').attr('width', width).attr('height', height);

          app.g = svg.append('g');

          var zoom = d3.zoom().scaleExtent([0.1, 10]).on('zoom', function(e) { app.g.attr('transform', e.transform); });
          svg.call(zoom);

          svg.on('click', function(event) {
            if (event.target === svg.node() && Alpine.store('graphStore').focusedNodeId) {
              app.resetLayout();
            }
          });

          document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && Alpine.store('graphStore').focusedNodeId) {
              app.resetLayout();
            }
          });

          var linkForce = d3.forceLink().id(function(d) { return d.id; })
            .distance(function(d) { return d.source.degree > 10 ? 60 : 30; })
            .strength(function(d) { return d.source.degree > 10 ? 0.25 : 0.7; });

          app.simulation = d3.forceSimulation()
            .force('collide', d3.forceCollide(15))
            .force('charge', d3.forceManyBody().strength(function(d) { return d.degree > 10 ? -350 : -120; }))
            .force('link', linkForce)
            .force('center', d3.forceCenter(width / 2, height / 2))
            .on('tick', function() {
              app.g.select('.links').selectAll('line')
                .attr('x1', function(d) { return d.source.x || 0; })
                .attr('y1', function(d) { return d.source.y || 0; })
                .attr('x2', function(d) { return d.target.x || 0; })
                .attr('y2', function(d) { return d.target.y || 0; });
              app.g.select('.nodes').selectAll('g')
                .attr('transform', function(d) {
                  var x = typeof d.x === 'number' && Number.isFinite(d.x) ? d.x : 0;
                  var y = typeof d.y === 'number' && Number.isFinite(d.y) ? d.y : 0;
                  return 'translate(' + x + ',' + y + ')';
                });
            });

          app.adjacencyMap = new Map();
          app.savedPositions = JSON.parse(localStorage.getItem('graph-viewer-layout-v1') || '{}');
          app.eventSource = null;
          app.previousNodeIds = new Set();
          app.logicalNodes = [];
          app.renderNodes = [];
          app.nodeVisualState = new Map();
          app.nodeRefs = new Map();
          app.removedNodeCache = new Map();
          app.newNodeTimers = new Map();
          app.removalTimers = new Map();
          app.pendingUpdate = null;
          app.rafScheduled = false;

          app.linksGroup = app.g.select('.links');
          if (app.linksGroup.empty()) app.linksGroup = app.g.append('g').attr('class', 'links');
          app.nodesGroup = app.g.select('.nodes');
          if (app.nodesGroup.empty()) app.nodesGroup = app.g.append('g').attr('class', 'nodes');

          app.connectSSE();
        },

        selectNode: function(node) {
          Alpine.store('graphStore').selectedNode = node;
          Alpine.store('graphStore').entityDetail = null;
          Alpine.store('graphStore').loadingDetail = true;

          fetch('/api/entity/' + node.id)
            .then(function(res) { return res.json(); })
            .then(function(data) {
              Alpine.store('graphStore').entityDetail = data;
              Alpine.store('graphStore').loadingDetail = false;
            })
            .catch(function() {
              Alpine.store('graphStore').loadingDetail = false;
            });
        },

        forceRefresh: function() {
          fetch('/api/force-refresh');
          Alpine.store('graphStore').lastUpdateText = 'Refresh forzado enviado...';
        },

        enterFocusMode: function(nodeId) {
          Alpine.store('graphStore').focusedNodeId = nodeId;
          if (!nodeId) {
            this.applyFilters();
            return;
          }
          var focusSet = new Set();
          focusSet.add(nodeId);
          var neighbors = app.adjacencyMap.get(nodeId) || new Set();
          neighbors.forEach(function(n) { focusSet.add(n); });
          app.g.select('.nodes').selectAll('g').style('opacity', function(d) {
            if (focusSet.has(d.id)) return 1;
            return 0.08;
          });
          app.g.select('.links').selectAll('line').style('opacity', function(d) {
            var sid = typeof d.source === 'object' ? d.source.id : d.source;
            var tid = typeof d.target === 'object' ? d.target.id : d.target;
            if (focusSet.has(sid) && focusSet.has(tid)) return 0.8;
            return 0.03;
          });
        },

        resetLayout: function() {
          Alpine.store('graphStore').focusedNodeId = null;
          app.g.select('.nodes').selectAll('g').style('opacity', function(d) {
            return Alpine.store('graphStore').activeFilters.includes(d.group) ? 1 : 0.1;
          });
          app.g.select('.links').selectAll('line').style('opacity', 0.6);
          app.simulation.alpha(1).restart();
        },

        formatDate: function(dateStr) {
          if (!dateStr) return '';
          var d = new Date(dateStr);
          return d.toLocaleDateString('es-ES') + ' ' + d.toLocaleTimeString('es-ES', {hour: '2-digit', minute: '2-digit'});
        },

        formatTime: function(date) {
          return date.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        },

        buildAdjacencyMap: function(nodes, links) {
          app.adjacencyMap.clear();
          for (var i = 0; i < nodes.length; i++) {
            app.adjacencyMap.set(nodes[i].id, new Set());
          }
          for (var i = 0; i < links.length; i++) {
            var sid = typeof links[i].source === 'object' ? links[i].source.id : links[i].source;
            var tid = typeof links[i].target === 'object' ? links[i].target.id : links[i].target;
            if (app.adjacencyMap.has(sid)) app.adjacencyMap.get(sid).add(tid);
            if (app.adjacencyMap.has(tid)) app.adjacencyMap.get(tid).add(sid);
          }
        },

        computeDegreeMap: function(nodes, links) {
          var degreeMap = new Map();
          for (var i = 0; i < links.length; i++) {
            var s = typeof links[i].source === 'object' ? links[i].source.id : links[i].source;
            var t = typeof links[i].target === 'object' ? links[i].target.id : links[i].target;
            degreeMap.set(s, (degreeMap.get(s) || 0) + 1);
            degreeMap.set(t, (degreeMap.get(t) || 0) + 1);
          }
          for (var i = 0; i < nodes.length; i++) {
            nodes[i].degree = degreeMap.get(nodes[i].id) || 0;
          }
        },

        applyHighlight: function(nodeId) {
          if (!nodeId) {
            app.g.select('.nodes').selectAll('g').style('opacity', function(d) {
return Alpine.store('graphStore').activeFilters.includes(d.group) ? 1 : 1;
            });
            app.g.select('.links').selectAll('line').style('opacity', 0.6);
            return;
          }
          var neighbors = app.adjacencyMap.get(nodeId) || new Set();
          app.g.select('.nodes').selectAll('g').style('opacity', function(d) {
            if (d.id === nodeId || neighbors.has(d.id)) return 1;
            return Alpine.store('graphStore').activeFilters.includes(d.group) ? 1 : 1;
          });
          app.g.select('.links').selectAll('line').style('opacity', function(d) {
            var sid = typeof d.source === 'object' ? d.source.id : d.source;
            var tid = typeof d.target === 'object' ? d.target.id : d.target;
            return (sid === nodeId || tid === nodeId) ? 0.8 : 0.3;
          });
        },

        applyFilters: function() {
          app.g.select('.nodes').selectAll('g').style('opacity', function(d) {
            if (Alpine.store('graphStore').focusedNodeId) {
              if (d.id === Alpine.store('graphStore').focusedNodeId) return 1;
              var neighbors = app.adjacencyMap.get(Alpine.store('graphStore').focusedNodeId) || new Set();
              if (neighbors.has(d.id)) return 1;
              return 1;
            }
            return Alpine.store('graphStore').activeFilters.includes(d.group) ? 1 : 0.1;
          });
          app.g.select('.links').selectAll('line').style('opacity', function(d) {
            if (Alpine.store('graphStore').focusedNodeId) {
              var sid = typeof d.source === 'object' ? d.source.id : d.source;
              var tid = typeof d.target === 'object' ? d.target.id : d.target;
              var neighbors = app.adjacencyMap.get(Alpine.store('graphStore').focusedNodeId) || new Set();
              if (sid === Alpine.store('graphStore').focusedNodeId || tid === Alpine.store('graphStore').focusedNodeId) return 0.8;
              if (neighbors.has(sid) && neighbors.has(tid)) return 0.6;
              return 0.3;
            }
            return 0.6;
          });
        },

        applyFocusMode: function(nodeId) {
          if (!nodeId) {
            this.applyFilters();
            return;
          }
          var focusSet = new Set();
          focusSet.add(nodeId);
          var neighbors = app.adjacencyMap.get(nodeId) || new Set();
          neighbors.forEach(function(n) { focusSet.add(n); });
          app.g.select('.nodes').selectAll('g').style('opacity', function(d) {
            if (focusSet.has(d.id)) return 1;
            return 0.08;
          });
          app.g.select('.links').selectAll('line').style('opacity', function(d) {
            var sid = typeof d.source === 'object' ? d.source.id : d.source;
            var tid = typeof d.target === 'object' ? d.target.id : d.target;
            if (focusSet.has(sid) && focusSet.has(tid)) return 0.8;
            return 0.03;
          });
        },

        processUpdate: function(msg) {
          if (msg.type !== 'init' && msg.type !== 'update') return;

          var nodes = msg.data.nodes;
          var links = msg.data.links;

          app.logicalNodes = nodes;
          this.buildAdjacencyMap(nodes, links);
          this.computeDegreeMap(nodes, links);

          for (var i = 0; i < nodes.length; i++) {
            var id = nodes[i].id;
            var saved = app.savedPositions[id];
            if (saved) {
              var x = typeof saved.x === 'number' && Number.isFinite(saved.x) ? saved.x : undefined;
              var y = typeof saved.y === 'number' && Number.isFinite(saved.y) ? saved.y : undefined;
              var fx = typeof saved.fx === 'number' && Number.isFinite(saved.fx) ? saved.fx : null;
              var fy = typeof saved.fy === 'number' && Number.isFinite(saved.fy) ? saved.fy : null;
              if (x !== undefined && y !== undefined) {
                nodes[i].x = x;
                nodes[i].y = y;
                nodes[i].fx = fx;
                nodes[i].fy = fy;
              }
            }
          }

          var newIds = new Set(nodes.map(function(n) { return n.id; }));
          var added = [];
          var removed = [];

          for (var i = 0; i < nodes.length; i++) {
            if (!app.previousNodeIds.has(nodes[i].id)) {
              added.push(nodes[i]);
            }
          }
          app.previousNodeIds.forEach(function(id) {
            if (!newIds.has(id)) {
              removed.push(id);
              var oldNode = app.logicalNodes.find(function(n) { return n.id === id; });
              if (oldNode) {
                app.removedNodeCache.set(id, {
                  id: oldNode.id, name: oldNode.name, group: oldNode.group,
                  x: oldNode.x, y: oldNode.y, fx: oldNode.fx, fy: oldNode.fy, degree: oldNode.degree
                });
              }
            }
          });
          app.previousNodeIds = newIds;

          Alpine.store('graphStore').nodeCount = nodes.length;
          Alpine.store('graphStore').linkCount = links.length;
          Alpine.store('graphStore').updateCount++;

          removed.forEach(function(id) {
            if (app.removalTimers.has(id)) return;
            app.nodeVisualState.set(id, 'removing');
            var nodeG = app.nodeRefs.get(id);
            if (!nodeG) return;
            nodeG.classed('node-removing', true);
            var timer = setTimeout(function() {
              app.nodeVisualState.set(id, 'fading');
              app.removalTimers.delete(id);
              var nodeG = app.nodeRefs.get(id);
              if (!nodeG) return;
              var t = d3.transition().duration(500);
              nodeG.transition(t).style('opacity', 0);
              nodeG.select('circle').transition(t).attr('r', 0).on('end interrupt', function() {
                if (!app.nodeVisualState.has(id)) return;
                app.nodeRefs.delete(id);
                app.nodeVisualState.delete(id);
                app.removedNodeCache.delete(id);
              });
            }, 2000);
            app.removalTimers.set(id, timer);
          });

          app.renderNodes = nodes.slice();
          app.nodeVisualState.forEach(function(state, id) {
            if (state === 'removing' || state === 'fading') {
              if (!app.renderNodes.find(function(n) { return n.id === id; })) {
                var cached = app.removedNodeCache.get(id);
                if (cached) app.renderNodes.push(cached);
              }
            }
          });

          var linkSel = app.g.select('.links').selectAll('line')
            .data(links, function(d) {
              var s = typeof d.source === 'object' ? d.source.id : d.source;
              var t = typeof d.target === 'object' ? d.target.id : d.target;
              return s + '-' + t;
            });
          linkSel.exit().transition().duration(300).style('opacity', 0).remove();
          linkSel = linkSel.enter().append('line').attr('class', 'link').attr('stroke-width', 1).style('opacity', 0).merge(linkSel);
          if (Alpine.store('graphStore').focusedNodeId) {
            this.applyFocusMode(Alpine.store('graphStore').focusedNodeId);
          } else {
            linkSel.transition().duration(300).style('opacity', 0.6);
          }

          var nodeSel = app.g.select('.nodes').selectAll('g')
            .data(app.renderNodes, function(d) { return d.id; });

          nodeSel.exit().each(function(d) {
            if (app.newNodeTimers.has(d.id)) {
              clearTimeout(app.newNodeTimers.get(d.id));
              app.newNodeTimers.delete(d.id);
            }
            if (app.removalTimers.has(d.id)) {
              clearTimeout(app.removalTimers.get(d.id));
              app.removalTimers.delete(d.id);
            }
            app.nodeRefs.delete(d.id);
            app.nodeVisualState.delete(d.id);
            app.removedNodeCache.delete(d.id);
          });
          nodeSel.exit().transition().duration(400).style('opacity', 0).remove();

          var nodeEnter = nodeSel.enter().append('g')
            .attr('transform', function(d) {
              var x = typeof d.x === 'number' && Number.isFinite(d.x) ? d.x : 0;
              var y = typeof d.y === 'number' && Number.isFinite(d.y) ? d.y : 0;
              return 'translate(' + x + ',' + y + ')';
            })
            .style('opacity', 0);

          nodeEnter.each(function(d) {
            app.nodeRefs.set(d.id, d3.select(this));
          });

          nodeEnter.append('circle').attr('r', 10).attr('fill', '#f8fafc').attr('stroke', '#9ca3af').attr('stroke-width', 1.7).style('opacity', 1);
          nodeEnter.append('text').attr('dy', 20).attr('text-anchor', 'middle');

          var nodeUpdate = nodeEnter.merge(nodeSel);

          var self = this;
          var lastClickTime = 0;
          nodeUpdate.on('click', function(event, d) {
            event.stopPropagation();
            var now = Date.now();
            if (now - lastClickTime < 300) {
              return;
            }
            lastClickTime = now;
            self.enterFocusMode(d.id);
            self.selectNode(d);
          });
          nodeUpdate.on('dblclick', function(event, d) {
            if (event.shiftKey) {
              d.fx = null;
              d.fy = null;
              delete app.savedPositions[d.id];
              localStorage.setItem('graph-viewer-layout-v1', JSON.stringify(app.savedPositions));
              app.simulation.alphaTarget(0.1).restart();
            }
            event.stopPropagation();
          });
          nodeUpdate.on('mouseover', function(event, d) {
            self.applyHighlight(d.id);
          });
          nodeUpdate.on('mouseout', function() {
            self.applyHighlight(null);
          });
          nodeUpdate.call(d3.drag()
            .on('start', function(event, d) {
              if (!event.active) app.simulation.alphaTarget(0.3).restart();
              d.fx = d.x;
              d.fy = d.y;
            })
            .on('drag', function(event, d) {
              d.fx = event.x;
              d.fy = event.y;
            })
            .on('end', function(event, d) {
              if (!event.active) app.simulation.alphaTarget(0);
              app.savedPositions[d.id] = { x: d.x, y: d.y, fx: d.fx, fy: d.fy };
              localStorage.setItem('graph-viewer-layout-v1', JSON.stringify(app.savedPositions));
            }));

          nodeEnter.transition().duration(600)
            .style('opacity', 1);

          added.forEach(function(n) {
            if (app.newNodeTimers.has(n.id)) return;
            app.nodeVisualState.set(n.id, 'new');
            var nodeG = app.nodeRefs.get(n.id);
            if (nodeG) nodeG.classed('node-new', true);
            var timer = setTimeout(function() {
              app.nodeVisualState.delete(n.id);
              app.newNodeTimers.delete(n.id);
              var nodeG = app.nodeRefs.get(n.id);
              if (nodeG) nodeG.classed('node-new', false);
            }, 1500);
            app.newNodeTimers.set(n.id, timer);
          });

          nodeUpdate
            .classed('node-new', function(d) { return app.nodeVisualState.get(d.id) === 'new'; })
            .classed('node-removing', function(d) {
              var s = app.nodeVisualState.get(d.id);
              return s === 'removing' || s === 'fading';
            });

          nodeUpdate.select('circle')
            .attr('class', 'node')
            .attr('r', function(d) { return Math.max(6, Math.min(20, 6 + d.degree * 1.5)); })
            .attr('fill', '#f8fafc')
            .attr('stroke', function(d) { return getNodeColor(d.group || 'unknown'); })
            .attr('stroke-width', function(d) { return Math.max(1.5, Math.min(4, 1.5 + d.degree * 0.2)); })
            .style('opacity', 1);

          nodeUpdate.select('text')
            .attr('class', 'label')
            .text(function(d) { return d.name; });

          this.applyFilters();

          if (msg.type === 'init') {
            app.simulation.nodes(app.renderNodes);
            app.simulation.force('link').links(links);
            app.simulation.alpha(1).restart();
          } else {
            app.simulation.nodes(app.renderNodes);
            app.simulation.force('link').links(links);
            app.simulation.alpha(0.3).restart();
          }
        },

        connectSSE: function() {
          if (app.eventSource) {
            app.eventSource.close();
          }
          app.eventSource = new EventSource('/api/events');
          app.eventSource.onmessage = function(e) {
            if (e.data === 'heartbeat') return;
            app.pendingUpdate = JSON.parse(e.data);

            if (!app.rafScheduled) {
              app.rafScheduled = true;
              requestAnimationFrame(function() {
                app.processUpdate(app.pendingUpdate);
                app.rafScheduled = false;
              });
            }
          };
          app.eventSource.onerror = function() {
            Alpine.store('graphStore').lastUpdateText = 'Reconectando...';
            setTimeout(function() { app.connectSSE(); }, 2000);
          };
        }
      };

      return app;
    }
  </script>
</body>
</html>
